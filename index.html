<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 我的超级通关大作战！ 🌟</title>
    <style>
        /* 整体卡通复古元气画风 */
        :root {
            --bg-color: #FFFDF3;
            --main-orange: #FF9233;
            --light-orange: #FFEEDD;
            --main-green: #4EAD5B;
            --text-dark: #332211;
            --card-shadow: 4px 4px 0px #332211;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部大标题 */
        .header {
            text-align: center;
            background: #FFF;
            border: 3px solid var(--text-dark);
            border-radius: 20px;
            padding: 15px 40px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--main-orange);
        }

        .header p {
            margin: 5px 0 0 0;
            font-weight: bold;
            font-size: 14px;
        }

        /* ADHD必备：多巴胺进度条 */
        .progress-container {
            width: 100%;
            max-width: 800px;
            background: #FFF;
            border: 3px solid var(--text-dark);
            border-radius: 15px;
            padding: 15px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .progress-title {
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar-bg {
            background: #EEEEEE;
            border: 2px solid var(--text-dark);
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: var(--main-green);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 日历网格布局 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* 每日卡片样式 */
        .day-card {
            background: #FFF;
            border: 3px solid var(--text-dark);
            border-radius: 18px;
            padding: 15px;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }

        .day-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #332211;
        }

        .day-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px dashed #DDD;
            padding-bottom: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-tag {
            font-size: 11px;
            background: var(--light-orange);
            color: var(--main-orange);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--main-orange);
        }

        /* 任务列表 */
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            user-select: none;
        }

        .task-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--main-green);
        }

        /* 已完成任务样式 */
        .task-item.completed {
            color: #A0A0A0;
            text-decoration: line-through;
        }

        /* 底部励志语 */
        .footer {
            margin-top: 40px;
            font-weight: bold;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 7.15 通关大作战</h1>
        <p>进度自动保存哦！不求完美，做完就是胜利！</p>
    </div>

    <div class="progress-container">
        <div class="progress-title">
            <span>🏆 总通关进度</span>
            <span id="progress-text">0 / 23 个任务</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>

    <div class="footer">
        祝你成功上岸！🎉 冲冲冲！
    </div>

    <script>
        // 核心任务数据填充
        const planData = [
            { date: '7月6日', tag: '单数日', tasks: ['资料分析：第1章', '判断推理：第3章', '言语理解：第1章'] },
            { date: '7月7日', tag: '双数日', tasks: ['资料分析：第2-3章', '判断推理：第4章', '言语理解：第2章'] },
            { date: '7月8日', tag: '单数日', tasks: ['资料分析：第4章', '判断推理：第5章', '言语理解：第3章'] },
            { date: '7月9日', tag: '双数日', tasks: ['资料分析：第5-6章', '判断推理：第6章', '言语理解：第4章'] },
            { date: '7月10日', tag: '单数日', tasks: ['资料分析：第7章', '判断推理：第7章', '言语理解：第5章'] },
            { date: '7月11日', tag: '双数日', tasks: ['资料分析：第8-9章', '判断推理：第8章', '言语理解：第6章'] },
            { date: '7月12日', tag: '单数日', tasks: ['资料分析：第10章', '判断推理：第9章', '言语理解：第7章'] },
            { date: '7月13日', tag: '冲刺日', tasks: ['资料分析：第11-12章', '判断推理：第10-11章', '言语理解：第8-9章'] },
            { date: '7月14日', tag: '终局日', tasks: ['资料分析：第13章 (完结!)', '判断推理：第12-13章 (完结!)', '言语理解：第10章 (完结!)'] }
        ];

        const grid = document.getElementById('calendar-grid');

        // 动态生成卡片
        planData.forEach((day, dayIndex) => {
            const card = document.createElement('div');
            card.className = 'day-card';

            let tasksHtml = '';
            day.tasks.forEach((task, taskIndex) => {
                const taskId = `task-${dayIndex}-${taskIndex}`;
                // 从 localStorage 读取历史存储状态
                const isChecked = localStorage.getItem(taskId) === 'true';
                const completedClass = isChecked ? 'completed' : '';
                const checkedAttr = isChecked ? 'checked' : '';

                tasksHtml += `
                    <li class="task-item ${completedClass}" onclick="toggleTask('${taskId}', this)">
                        <input type="checkbox" id="${taskId}" ${checkedAttr} onclick="event.stopPropagation(); toggleTask('${taskId}', this.parentElement)">
                        <span>${task}</span>
                    </li>
                `;
            });

            card.innerHTML = `
                <div class="day-title">
                    <span>${day.date}</span>
                    <span class="day-tag">${day.tag}</span>
                </div>
                <ul class="task-list">
                    ${tasksHtml}
                </ul>
            `;
            grid.appendChild(card);
        });

        // 任务勾选、存储与进度条联动
        function toggleTask(id, element) {
            const checkbox = document.getElementById(id);
            if (event.target.tagName !== 'INPUT') {
                checkbox.checked = !checkbox.checked;
            }
            
            if (checkbox.checked) {
                element.classList.add('completed');
                localStorage.setItem(id, 'true'); // 存入本地
            } else {
                element.classList.remove('completed');
                localStorage.setItem(id, 'false'); // 更新状态
            }
            updateProgress();
        }

        function updateProgress() {
            const total = document.querySelectorAll('input[type="checkbox"]').length;
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const percentage = total === 0 ? 0 : Math.round((checked / total) * 100);
            
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-text').innerText = `${checked} / ${total} 个任务 (${percentage}%)`;
        }

        // 初始化加载进度
        updateProgress();
    </script>
</body>
</html>
